baseURL = "https://newthink.ai/"
languageCode = "en-US"
title = "New Think"
theme = "hugo-theme-stack"

[markup.goldmark.renderer]
  unsafe = true

[params]
  mainSections = ["posts"]
  description = "Real-world AI use cases across everyday and professional problems."
  scheduleUrl = "#"  # Replace with your Calendly or scheduling link

  [params.sidebar]
    subtitle = "AI for everything. Think differently."
    compact = false

  [params.article]
    readingTime = true
    math = false
    toc = false

  [params.comments]
    enabled = false

  [params.defaultImage.opengraph]
    enabled = false

[menu]
  [[menu.main]]
    name = "Articles"
    url = "/posts"
    weight = 10
  [[menu.main]]
    name = "Topics"
    url = "/topics"
    weight = 15
  [[menu.main]]
    name = "About"
    url = "/about"
    weight = 20
  [[menu.main]]
    name = "Contact"
    url = "/contact"
    weight = 30
